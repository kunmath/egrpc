name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnghttp2-dev libssl-dev libprotobuf-dev pkg-config
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnghttp2-dev libssl-dev libprotobuf-dev pkg-config python3-venv
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DEGRPC_SANITIZE=address,undefined
      - name: Build
        run: cmake --build build -j
      - name: Test
        env:
          ASAN_OPTIONS: strict_string_checks=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build --output-on-failure
      # The integration probes exercise the EventThread⇄Http2Session⇄timer
      # interplay end-to-end; run them sanitized too, not just the unit tests.
      - name: Integration harness (sanitized probes)
        env:
          ASAN_OPTIONS: strict_string_checks=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          python3 -m venv .venv
          .venv/bin/pip install pytest h2 grpcio grpcio-tools
          .venv/bin/pytest tests -v

  # TSan is mandatory from M1 on (design §9): the condvar-heavy threading
  # model makes data races the top project risk.
  sanitize-thread:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnghttp2-dev libssl-dev libprotobuf-dev pkg-config
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DEGRPC_SANITIZE=thread
      - name: Build
        run: cmake --build build -j
      - name: Test
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: ctest --test-dir build --output-on-failure

  # Ring-3 style integration: pytest harness drives the built probe binary
  # against Python TLS servers (M1 acceptance: ALPN h2 / clean failures).
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnghttp2-dev libssl-dev libprotobuf-dev pkg-config python3-venv
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j
      - name: Run pytest harness
        run: |
          python3 -m venv .venv
          .venv/bin/pip install pytest h2 grpcio grpcio-tools
          .venv/bin/pytest tests -v

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format-18
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: |
          files=$(git ls-files '*.h' '*.cc' | grep -v '^third_party/' || true)
          if [ -z "$files" ]; then
            echo "No files to check."
            exit 0
          fi
          echo "$files" | xargs clang-format-18 --dry-run --Werror

  # Builds the pinned toolchain from source (~6+ min uncached), so to save
  # runner minutes it only runs when manually dispatched from the Actions tab.
  # Re-enable per-push (drop the `if`) once minutes are not a concern.
  codegen-tools:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Cache pinned codegen tools
        uses: actions/cache@v4
        with:
          path: |
            tools/bin
            tools/include
            tools/.pin-codegen-work
          key: pin-codegen-${{ hashFiles('tools/pin-codegen.sh') }}
      - name: Build pinned codegen tools
        run: tools/pin-codegen.sh
      - name: Verify protoc
        run: tools/bin/protoc --version
